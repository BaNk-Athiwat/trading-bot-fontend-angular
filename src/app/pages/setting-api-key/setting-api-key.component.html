<div class="flex flex-col gap-10 mx-20 my-10">
	<div class="px-6 pb-4">
		<p class="mb-5">Exchange</p>
		@if(isMainRoute()) {
		<div class="flex flex-wrap gap-6">
			<app-connection-box [exchange]="bitkubEnum"></app-connection-box>
			<app-connection-box [exchange]="binanceEnum"></app-connection-box>
			<app-connection-box [exchange]="okxEnum"></app-connection-box>
		</div>
		} @else {

		<div class="flex justify-center">
			<router-outlet></router-outlet>
		</div>
		}
	</div>
</div>
