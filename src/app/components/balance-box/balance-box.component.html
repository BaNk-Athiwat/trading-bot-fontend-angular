<div
	class="relative flex items-center justify-center drop-shadow-md rounded-xl bg-gray-600 w-60 h-32"
>
	<div
		class="absolute top-0 left-0 rounded-ee-md text-sm px-2 py-1/2"
		[ngClass]="{
			'bg-green-500': exchange === bitkubEnum,
			'bg-yellow-500': exchange === binanceEnum,
			'bg-gray-500': exchange === okxEnum
		}"
	>
		{{ exchange || "unknow" }}
	</div>
	<div class="">
		<p class="text-3xl">&asymp; {{ balance }}</p>
		<p class="text-s text-right">
			@if (exchange === bitkubEnum) { THB } @else { USD }
		</p>
	</div>
</div>
